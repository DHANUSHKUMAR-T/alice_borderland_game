{% extends "base.html" %}
{% block content %}

<div class="game-container">
    <div class="game-card-display">

        <h2 class="menu-title">🂪 Spades 10 – Hunter’s Hour</h2>

        <p class="game-text">
            Survive 60 seconds while the Hunter tracks you.
        </p>

        <button id="start-btn" class="btn red-btn">Start Game</button>

        <div id="game-area" style="display:none;">
            <p id="timer-display">Time Left: 60s</p>

            <canvas id="gameCanvas" width="600" height="400"
                    style="background:black; border:2px solid red;"></canvas>

            <p id="result"></p>

            <div class="button-row">
                <a id="next-btn"
                   href="{{ url_for('main.suit_cards', suit='spades') }}"
                   class="btn card-btn"
                   style="display:none;">
                   Next Card →
                </a>

                <a href="{{ url_for('main.suit_cards', suit='spades') }}"
                   class="btn card-btn">
                   Back
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
    
        const startBtn = document.getElementById("start-btn");
        const gameArea = document.getElementById("game-area");
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const resultEl = document.getElementById("result");
        const nextBtn = document.getElementById("next-btn");
        const timerDisplay = document.getElementById("timer-display");
    
        let player = { x: 50, y: 200, size: 20, speed: 4 };
        let hunters = [];
        let keys = {};
        let gameInterval;
        let timerInterval;
        let timeLeft = 60;
        let gameRunning = false;
    
        startBtn.onclick = function() {
            startBtn.style.display = "none";
            gameArea.style.display = "block";
            startGame();
        };
    
        function startGame() {
            player.x = 50;
            player.y = 200;
    
            hunters = [{
                x: 500,
                y: 200,
                size: 25,
                speed: 1.5
            }];
    
            timeLeft = 60;
            resultEl.textContent = "";
            nextBtn.style.display = "none";
    
            gameRunning = true;
    
            clearInterval(gameInterval);
            clearInterval(timerInterval);
    
            gameInterval = setInterval(update, 20);
            timerInterval = setInterval(updateTimer, 1000);
        }
    
        document.addEventListener("keydown", function(e) {
            if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
                e.preventDefault();
            }
            keys[e.key] = true;
        });
    
        document.addEventListener("keyup", function(e) {
            keys[e.key] = false;
        });
    
        function update() {
            if (!gameRunning) return;
    
            ctx.clearRect(0, 0, canvas.width, canvas.height);
    
            movePlayer();
            moveHunters();
    
            drawPlayer();
            drawHunters();
    
            checkCollision();
        }
    
        function movePlayer() {
            if (keys["ArrowUp"]) player.y -= player.speed;
            if (keys["ArrowDown"]) player.y += player.speed;
            if (keys["ArrowLeft"]) player.x -= player.speed;
            if (keys["ArrowRight"]) player.x += player.speed;
    
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
        }
    
        function moveHunters() {
            hunters.forEach(hunter => {
    
                let dx = player.x - hunter.x;
                let dy = player.y - hunter.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
    
                if (distance > 0) {
                    hunter.x += (dx / distance) * hunter.speed;
                    hunter.y += (dy / distance) * hunter.speed;
                }
            });
        }
    
        function drawPlayer() {
            ctx.fillStyle = "red";
            ctx.fillRect(player.x, player.y, player.size, player.size);
        }
    
        function drawHunters() {
            ctx.fillStyle = "purple";
            hunters.forEach(h => {
                ctx.fillRect(h.x, h.y, h.size, h.size);
            });
        }
    
        function checkCollision() {
            hunters.forEach(hunter => {
                if (
                    player.x < hunter.x + hunter.size &&
                    player.x + player.size > hunter.x &&
                    player.y < hunter.y + hunter.size &&
                    player.y + player.size > hunter.y
                ) {
                    failGame("💀 Hunter Caught You!");
                }
            });
        }
    
        function updateTimer() {
            if (!gameRunning) return;
    
            timeLeft--;
            timerDisplay.textContent = "Time Left: " + timeLeft + "s";
    
            // Increase speed gradually
            hunters.forEach(h => {
                if (timeLeft % 10 === 0) {
                    h.speed += 0.3;
                }
            });
    
            // 👾 Spawn second hunter at 30 seconds
            if (timeLeft === 30) {
                hunters.push({
                    x: 100,
                    y: 50,
                    size: 25,
                    speed: 2.0
                });
            }
    
            if (timeLeft <= 0) {
                winGame();
            }
        }
    
        function winGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
    
            resultEl.textContent = "🎉 You Survived Hunter’s Hour!";
            resultEl.style.color = "#00ff66";
            nextBtn.style.display = "inline-block";
    
            fetch("/complete/spades/10", { method: "POST" });
        }
    
        function failGame(msg) {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
    
            resultEl.textContent = msg;
            resultEl.style.color = "#ff3333";
    
            setTimeout(startGame, 2000);
        }
    
    };
    </script>

{% endblock %}
