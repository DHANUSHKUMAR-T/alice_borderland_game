{% extends "base.html" %}
{% block content %}

<div class="game-container">
<div class="game-card-display">

<h2 class="menu-title">♦ 7 – Time Loop Logic</h2>

<p class="game-text">
You are trapped in a time loop.<br>
Each loop reveals part of the truth.
</p>

<button id="start-btn" class="btn red-btn">Enter Loop</button>

<div id="game-area" style="display:none;">

<p id="loop-text">Round 1 | Loop 1 / 3</p>

<div id="clue-box"></div>

<button id="next-loop-btn" class="btn card-btn" onclick="nextLoop()">
Continue Loop
</button>

<div id="final-question" style="display:none;">

<p class="game-text">
Combine the clues. What is the correct code?
</p>

<div id="answers"></div>

</div>

<p id="result"></p>

<div class="button-row">

<a id="next-btn"
href="{{ url_for('main.suit_cards', suit='diamonds') }}"
class="btn card-btn"
style="display:none;">
Next Card →
</a>

<a href="{{ url_for('main.suit_cards', suit='diamonds') }}"
class="btn card-btn">
Back
</a>

</div>

</div>
</div>
</div>

<script>

window.onload=function(){

const startBtn=document.getElementById("start-btn");
const gameArea=document.getElementById("game-area");
const loopText=document.getElementById("loop-text");
const clueBox=document.getElementById("clue-box");
const nextLoopBtn=document.getElementById("next-loop-btn");
const finalQuestion=document.getElementById("final-question");
const answersDiv=document.getElementById("answers");
const resultEl=document.getElementById("result");
const nextBtn=document.getElementById("next-btn");

let round = 0;
let loop = 0;
const maxRounds = 3;

let currentPuzzle;

const puzzleSets = [

{
clues:[
"The code contains the number 7.",
"The code is greater than 20.",
"The code is divisible by 7."
],
answer:"21",
options:["14","21","28","35"]
},

{
clues:[
"The code is even.",
"The code is less than 20.",
"The code is divisible by 3."
],
answer:"18",
options:["12","15","18","21"]
},

{
clues:[
"The code ends with 5.",
"The code is greater than 10.",
"The code is divisible by 5."
],
answer:"15",
options:["10","15","20","25"]
},

{
clues:[
"The code is odd.",
"The code is less than 10.",
"The code is prime."
],
answer:"7",
options:["3","5","7","9"]
},

{
clues:[
"The code is divisible by 4.",
"The code is greater than 15.",
"The code is less than 25."
],
answer:"20",
options:["16","18","20","24"]
}

];

startBtn.onclick=function(){

startBtn.style.display="none";
gameArea.style.display="block";

nextRound();

}

function nextRound(){

if(round >= maxRounds){
winGame();
return;
}

round++;
loop = 0;

currentPuzzle = puzzleSets[Math.floor(Math.random()*puzzleSets.length)];

finalQuestion.style.display="none";
clueBox.style.display="block";
nextLoopBtn.style.display="inline-block";
nextLoopBtn.textContent="Continue Loop";

nextLoop();

}

window.nextLoop=function(){

if(loop < 3){

loop++;

loopText.textContent = "Round "+round+" | Loop "+loop+" / 3";

clueBox.textContent = currentPuzzle.clues[loop-1];

if(loop===3){
nextLoopBtn.textContent="Solve Puzzle";
}

}
else{

showFinalQuestion();

}

}

function showFinalQuestion(){

clueBox.style.display="none";
nextLoopBtn.style.display="none";

finalQuestion.style.display="block";

renderAnswers();

}

function renderAnswers(){

answersDiv.innerHTML="";

currentPuzzle.options.forEach(opt=>{

answersDiv.innerHTML+=`
<button class="option-btn" onclick="choose('${opt}')">
${opt}
</button>
`;

});

}

window.choose=function(choice){

if(choice === currentPuzzle.answer){

resultEl.textContent="✔ Correct. Loop broken.";
resultEl.style.color="#00ff66";

setTimeout(()=>{
resultEl.textContent="";
nextRound();
},1500);

}
else{

resultEl.textContent="❌ Wrong. Time loop resets.";
resultEl.style.color="#ff3333";

setTimeout(()=>{
resultEl.textContent="";
loop=0;
clueBox.style.display="block";
nextLoopBtn.style.display="inline-block";
finalQuestion.style.display="none";
nextLoop();
},1500);

}

}

function winGame(){

resultEl.innerHTML="🎉 You escaped all time loops.";

resultEl.style.color="#00ff66";

nextBtn.style.display="inline-block";

fetch("/complete/diamonds/7",{method:"POST"});

}

}

</script>

<style>

#clue-box{
margin:25px auto;
padding:20px;
max-width:500px;
border:2px solid red;
background:#111;
font-size:18px;
}

.option-btn{
margin:10px;
padding:12px 20px;
border:2px solid red;
background:#111;
color:white;
cursor:pointer;
}

.option-btn:hover{
transform:scale(1.05);
}

</style>

{% endblock %}
