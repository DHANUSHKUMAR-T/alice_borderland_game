{% extends "base.html" %} {% block content %}

<div class="game-container">
  <div class="game-card-display">
    <h2 class="menu-title">♣ 6 – Signal Chain</h2>

    <p class="game-text">
      Three rooms send signals.<br />
      Only one message can be sent at a time.
    </p>

    <button id="start-btn" class="btn red-btn">Connect Rooms</button>

    <div id="game-area" style="display: none">
      <p id="status">Waiting for signal...</p>

      <div class="rooms">
        <button class="room-btn" onclick="sendSignal(1)">Room A</button>
        <button class="room-btn" onclick="sendSignal(2)">Room B</button>
        <button class="room-btn" onclick="sendSignal(3)">Room C</button>
      </div>

      <div id="clue-box"></div>

      <div id="answers" style="display: none"></div>

      <p id="result"></p>

      <div class="button-row">
        <a
          id="next-btn"
          href="{{ url_for('main.suit_cards', suit='clubs') }}"
          class="btn card-btn"
          style="display: none"
        >
          Next Card →
        </a>

        <a
          href="{{ url_for('main.suit_cards', suit='clubs') }}"
          class="btn card-btn"
        >
          Back
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  window.onload = function () {
    const startBtn = document.getElementById("start-btn");
    const gameArea = document.getElementById("game-area");
    const clueBox = document.getElementById("clue-box");
    const status = document.getElementById("status");
    const answersDiv = document.getElementById("answers");
    const resultEl = document.getElementById("result");
    const nextBtn = document.getElementById("next-btn");

    let signals = [];
    let puzzle;
    let clues;
    let correctAnswer;
    let options;

    let round = 1;
    const maxRounds = 3;

    /* -----------------------------
       Puzzle Sets
    ----------------------------- */

    const puzzles = [
      {
        clues: [
          "The number is greater than 10.",
          "The number is divisible by 3.",
          "The number is less than 15.",
        ],
        answer: "12",
        options: ["9", "12", "15", "18"],
      },

      {
        clues: [
          "The number is even.",
          "The number is divisible by 4.",
          "The number is less than 18.",
        ],
        answer: "16",
        options: ["12", "14", "16", "18"],
      },

      {
        clues: [
          "The number is a square number.",
          "The number is greater than 10.",
          "The number is less than 20.",
        ],
        answer: "16",
        options: ["9", "12", "16", "18"],
      },

      {
        clues: [
          "The number is divisible by 5.",
          "The number is greater than 10.",
          "The number is less than 20.",
        ],
        answer: "15",
        options: ["10", "12", "15", "20"],
      },

      {
        clues: [
          "The number is prime.",
          "The number is greater than 10.",
          "The number is less than 20.",
        ],
        answer: "13",
        options: ["11", "13", "15", "17"],
      },

      {
        clues: [
          "The number is divisible by 7.",
          "The number is greater than 10.",
          "The number is less than 20.",
        ],
        answer: "14",
        options: ["7", "12", "14", "21"],
      },
    ];

    /* -----------------------------
       Start Game
    ----------------------------- */

    startBtn.onclick = function () {
      startBtn.style.display = "none";
      gameArea.style.display = "block";

      startRound();
    };

    /* -----------------------------
       Start Round
    ----------------------------- */

    function startRound() {
      signals = [];
      clueBox.innerHTML = "";
      answersDiv.innerHTML = "";
      answersDiv.style.display = "none";
      resultEl.textContent = "";

      setupPuzzle();

      status.textContent =
        "Round " + round + " / " + maxRounds + " — Activate rooms.";
    }

    /* -----------------------------
       Setup Random Puzzle
    ----------------------------- */

    function setupPuzzle() {
      puzzle = puzzles[Math.floor(Math.random() * puzzles.length)];

      clues = puzzle.clues;
      correctAnswer = puzzle.answer;
      options = shuffle([...puzzle.options]);
    }

    /* -----------------------------
       Send Signal
    ----------------------------- */

    window.sendSignal = function (room) {
      if (signals.includes(room)) return;

      signals.push(room);

      clueBox.innerHTML += `
    <div class="clue">Room ${room}: ${clues[room - 1]}</div>
    `;

      if (signals.length === 3) {
        status.textContent = "All signals received. Decode the number.";

        showAnswers();
      }
    };

    /* -----------------------------
       Show Answers
    ----------------------------- */

    function showAnswers() {
      answersDiv.style.display = "block";

      options.forEach((opt) => {
        answersDiv.innerHTML += `
    <button class="option-btn" onclick="choose('${opt}')">
    ${opt}
    </button>
    `;
      });
    }

    /* -----------------------------
       Choose Answer
    ----------------------------- */

    window.choose = function (choice) {
      if (choice === correctAnswer) {
        resultEl.textContent = "✔ Correct.";
        resultEl.style.color = "#00ff66";

        if (round < maxRounds) {
          round++;

          setTimeout(() => {
            startRound();
          }, 1500);
        } else {
          winGame();
        }
      } else {
        resultEl.textContent = "❌ Wrong interpretation.";
        resultEl.style.color = "#ff3333";
      }
    };

    /* -----------------------------
       Win Game
    ----------------------------- */

    function winGame() {
      resultEl.textContent = "🎉 Signal chain fully decoded.";
      resultEl.style.color = "#00ff66";

      nextBtn.style.display = "inline-block";

      fetch("/complete/clubs/6", { method: "POST" });
    }

    /* -----------------------------
       Shuffle
    ----------------------------- */

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }

      return array;
    }
  };
</script>

<style>
  .rooms {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px;
  }

  .room-btn {
    padding: 12px 20px;
    border: 2px solid red;
    background: #111;
    color: white;
    cursor: pointer;
  }

  .room-btn:hover {
    transform: scale(1.05);
  }

  #clue-box {
    margin: 20px 0;
  }

  .clue {
    border: 2px solid red;
    padding: 10px;
    margin: 5px;
    background: #111;
  }

  .option-btn {
    margin: 10px;
    padding: 12px 20px;
    border: 2px solid red;
    background: #111;
    color: white;
    cursor: pointer;
  }

  .option-btn:hover {
    transform: scale(1.05);
  }
</style>

{% endblock %}
