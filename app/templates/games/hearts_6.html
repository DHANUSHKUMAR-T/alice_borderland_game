{% extends "base.html" %}
{% block content %}

<div class="game-container">
    <div class="game-card-display">

        <h2 class="menu-title">♥ 6 – Memory Betrayal</h2>

        <p class="game-text">
            Remember the players.<br>
            Wrong answers reduce Trust.
        </p>

        <button id="start-btn" class="btn red-btn">Start Game</button>

        <div id="game-area" style="display:none;">

            <p id="trust-display">Trust: ❤️❤️❤️</p>
            <p id="countdown" class="countdown-text"></p>

            <div id="profiles" class="profiles"></div>

            <div id="question-area" style="display:none;">
                <p id="question-text"></p>
                <div id="options"></div>
            </div>

            <p id="result"></p>

            <div class="button-row">
                <a id="next-btn"
                   href="{{ url_for('main.suit_cards', suit='hearts') }}"
                   class="btn card-btn"
                   style="display:none;">
                   Next Card →
                </a>

                <a href="{{ url_for('main.suit_cards', suit='hearts') }}"
                   class="btn card-btn">
                   Back
                </a>
            </div>

        </div>
    </div>
</div>

<script>
window.onload = function() {

    const startBtn = document.getElementById("start-btn");
    const gameArea = document.getElementById("game-area");
    const profilesDiv = document.getElementById("profiles");
    const questionArea = document.getElementById("question-area");
    const questionText = document.getElementById("question-text");
    const optionsDiv = document.getElementById("options");
    const trustDisplay = document.getElementById("trust-display");
    const countdownEl = document.getElementById("countdown");
    const resultEl = document.getElementById("result");
    const nextBtn = document.getElementById("next-btn");

    let trust;
    let correctAnswers;
    let currentQuestion;
    let players = [];
    let questions = [];
    let readingTime;
    let readingInterval;

    const namesPool = ["Arun","Maya","Ravi","Kiran","Sneha","Vikram","Aisha","Rahul"];
    const colorsPool = ["Red","Blue","Green","Yellow","Purple","Black"];
    const hobbyPool = ["Chess","Painting","Running","Coding","Singing","Gaming"];

    startBtn.onclick = function() {
        startBtn.style.display = "none";
        gameArea.style.display = "block";
        startGame();
    };

    function startGame() {
        trust = 3;
        correctAnswers = 0;
        currentQuestion = 0;
        readingTime = 12;

        updateTrust();
        resultEl.textContent = "";
        nextBtn.style.display = "none";
        questionArea.style.display = "none";
        countdownEl.textContent = "";

        generatePlayers();
        generateQuestions();
        showProfiles();
    }

    function getRandomUnique(arr, count) {
        let shuffled = [...arr].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
    }

    function generatePlayers() {
        players = [];

        const selectedNames = getRandomUnique(namesPool, 3);
        const selectedColors = getRandomUnique(colorsPool, 3);
        const selectedHobbies = getRandomUnique(hobbyPool, 3);

        for (let i = 0; i < 3; i++) {
            players.push({
                name: selectedNames[i],
                color: selectedColors[i],
                hobby: selectedHobbies[i]
            });
        }
    }

    function generateQuestions() {
        questions = [];

        players.forEach(p => {
            questions.push({
                text: `Who likes ${p.hobby}?`,
                correct: p.name
            });
            questions.push({
                text: `Who prefers ${p.color}?`,
                correct: p.name
            });
        });

        questions = questions.sort(() => 0.5 - Math.random()).slice(0, 3);
    }

    function showProfiles() {
        profilesDiv.innerHTML = "";

        players.forEach(p => {
            profilesDiv.innerHTML += `
                <div class="profile-card">
                    <strong>${p.name}</strong><br>
                    Favorite Color: ${p.color}<br>
                    Hobby: ${p.hobby}
                </div>
            `;
        });

        countdownEl.textContent = "Memorize: 12s";

        readingInterval = setInterval(() => {
            readingTime--;

            countdownEl.textContent = "Memorize: " + readingTime + "s";

            if (readingTime <= 0) {
                clearInterval(readingInterval);
                countdownEl.textContent = "";
                profilesDiv.innerHTML = "<p>Profiles Hidden...</p>";
                questionArea.style.display = "block";
                askQuestion();
            }
        }, 1000);
    }

    function askQuestion() {

        if (currentQuestion >= questions.length) {

            if (correctAnswers >= 2) {
                winGame();
            } else {
                failGame("💔 You Failed to Maintain Trust.");
            }

            return;
        }

        const q = questions[currentQuestion];
        questionText.textContent = q.text;
        optionsDiv.innerHTML = "";

        let optionNames = players.map(p => p.name)
                                 .sort(() => 0.5 - Math.random());

        optionNames.forEach(opt => {
            const btn = document.createElement("button");
            btn.textContent = opt;
            btn.className = "option-btn";
            btn.onclick = () => checkAnswer(opt, q.correct);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct) {

        if (selected === correct) {
            correctAnswers++;
            resultEl.textContent = "✔ Correct.";
            resultEl.style.color = "#00ff66";
        } else {
            trust--;
            updateTrust();
            resultEl.textContent = "❌ Wrong. Trust Lost.";
            resultEl.style.color = "#ff3333";

            if (trust <= 0) {
                failGame("💔 Trust Broken. Eliminated.");
                return;
            }
        }

        currentQuestion++;

        setTimeout(() => {
            resultEl.textContent = "";
            askQuestion();
        }, 1200);
    }

    function updateTrust() {
        trustDisplay.textContent = "Trust: " + "❤️".repeat(trust);
    }

    function winGame() {
        resultEl.textContent = "🎉 Trust Maintained. You Survived.";
        resultEl.style.color = "#00ff66";
        nextBtn.style.display = "inline-block";

        fetch("/complete/hearts/6", { method: "POST" });
    }

    function failGame(msg) {
        resultEl.textContent = msg;
        resultEl.style.color = "#ff3333";
        setTimeout(startGame, 2000);
    }

};
</script>

<style>
.profiles {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
}

.profile-card {
    background: #111;
    border: 2px solid red;
    padding: 15px;
    border-radius: 10px;
    color: white;
}

.option-btn {
    margin: 10px;
    padding: 10px 15px;
    border: 2px solid red;
    background: #111;
    color: white;
    cursor: pointer;
}

.option-btn:hover {
    transform: scale(1.05);
}

.countdown-text {
    font-size: 18px;
    color: #ffff66;
    margin-bottom: 10px;
}
</style>

{% endblock %}
