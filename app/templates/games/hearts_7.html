{% extends "base.html" %}
{% block content %}

<div class="game-container">
<div class="game-card-display">

<h2 class="menu-title">♥ 7 – Silent Accusation</h2>

<p class="game-text">
Everyone is accusing someone.<br>
Who is the liar?
</p>

<button id="start-btn" class="btn red-btn">Start Game</button>

<div id="game-area" style="display:none;">

<p id="trust-display">Trust: ❤️❤️❤️</p>

<div id="players" class="profiles"></div>

<p id="question-text"></p>

<div id="options"></div>

<p id="result"></p>

<div class="button-row">
<a id="next-btn"
href="{{ url_for('main.suit_cards', suit='hearts') }}"
class="btn card-btn"
style="display:none;">
Next Card →
</a>

<a href="{{ url_for('main.suit_cards', suit='hearts') }}"
class="btn card-btn">
Back
</a>
</div>

</div>
</div>
</div>

<script>

    window.onload = function(){
    
    const startBtn = document.getElementById("start-btn");
    const gameArea = document.getElementById("game-area");
    const playersDiv = document.getElementById("players");
    const questionText = document.getElementById("question-text");
    const optionsDiv = document.getElementById("options");
    const trustDisplay = document.getElementById("trust-display");
    const resultEl = document.getElementById("result");
    const nextBtn = document.getElementById("next-btn");
    
    let trust = 3;
    let round = 0;
    const maxRounds = 3;
    
    const namesPool = ["Arun","Maya","Ravi","Kiran","Sneha","Rahul","Vikram","Aisha"];
    
    let players = [];
    
    startBtn.onclick = function(){
    startBtn.style.display="none";
    gameArea.style.display="block";
    startGame();
    }
    
    function startGame(){
    
    trust = 3;
    round = 0;
    updateTrust();
    
    players = shuffle(namesPool).slice(0,4);
    
    showPlayers();
    nextRound();
    
    }
    
    function shuffle(arr){
    return [...arr].sort(()=>0.5-Math.random());
    }
    
    function updateTrust(){
    trustDisplay.textContent = "Trust: " + "❤️".repeat(trust);
    }
    
    function showPlayers(){
    
    playersDiv.innerHTML="";
    
    players.forEach(p=>{
    playersDiv.innerHTML+=`
    <div class="profile-card">${p}</div>
    `;
    })
    
    }
    
    function nextRound(){
    
    if(round >= maxRounds){
    winGame();
    return;
    }
    
    let accuser = players[Math.floor(Math.random()*players.length)];
    let target = players[Math.floor(Math.random()*players.length)];
    
    while(target === accuser){
    target = players[Math.floor(Math.random()*players.length)];
    }
    
    questionText.textContent =
    accuser + " says " + target + " is lying.";
    
    optionsDiv.innerHTML="";
    
    players.forEach(name=>{
    
    let btn=document.createElement("button");
    btn.className="option-btn";
    btn.textContent=name;
    
    btn.onclick=()=>vote(name);
    
    optionsDiv.appendChild(btn);
    
    });
    
    }
    
    function vote(choice){
    
    // random trust loss
    if(Math.random() < 0.5){
    trust--;
    if(trust < 0) trust = 0;
    updateTrust();
    }
    
    resultEl.textContent =
    "You accused " + choice + "... but no one was lying.";
    
    resultEl.style.color="#ff3333";
    
    round++;
    
    setTimeout(()=>{
    resultEl.textContent="";
    nextRound();
    },1500);
    
    }
    
    function winGame(){
    
    resultEl.innerHTML =
    "🎉 The accusations end.<br><br>" +
    "<b>No one knows the real story of Ravi, Maya, Arun, and Kiran.<br>" +
    "No one was a liar.</b>"+
    "<b>So don't trust anyone!</b>";
    
    resultEl.style.color="#00ff66";
    
    nextBtn.style.display="inline-block";
    
    fetch("/complete/hearts/7",{method:"POST"});
    
    }
    
    }
    
    </script>

<style>

.profiles{
display:flex;
justify-content:center;
gap:20px;
margin:20px 0;
}

.profile-card{
background:#111;
border:2px solid red;
padding:12px 20px;
border-radius:10px;
}

.option-btn{
margin:10px;
padding:10px 18px;
border:2px solid red;
background:#111;
color:white;
cursor:pointer;
}

.option-btn:hover{
transform:scale(1.05);
}

</style>

{% endblock %}
