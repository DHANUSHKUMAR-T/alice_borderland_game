{% extends "base.html" %}
{% block content %}

<div class="game-container">
    <div class="game-card-display">

        <h2 class="menu-title">🂩 Spades 9 – Vertical Escape</h2>

        <p class="game-text">
            Climb the 6-floor tower.<br>
            Platforms collapse after you step on them.
        </p>

        <button id="start-btn" class="btn red-btn">Start Game</button>

        <div id="game-area" style="display:none;">
            <p id="floor-display">Floor: 1 / 6</p>

            <canvas id="gameCanvas" width="500" height="600"
                    style="background:black; border:2px solid red;"></canvas>

            <p id="result"></p>

            <div class="button-row">
                <a id="next-btn"
                   href="{{ url_for('main.suit_cards', suit='spades') }}"
                   class="btn card-btn"
                   style="display:none;">
                   Next Card →
                </a>

                <a href="{{ url_for('main.suit_cards', suit='spades') }}"
                   class="btn card-btn">
                   Back
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
    
        const startBtn = document.getElementById("start-btn");
        const gameArea = document.getElementById("game-area");
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const resultEl = document.getElementById("result");
        const nextBtn = document.getElementById("next-btn");
        const floorDisplay = document.getElementById("floor-display");
    
        let player = { x: 230, y: 550, size: 20, speed: 4 };
        let platforms = [];
        let keys = {};
        let monsters = [];
        let score = 0;
        let startTime;
        let gameInterval;
        let gameRunning = false;
    
        const floors = 6;
        const floorHeight = 100;
    
        startBtn.onclick = function() {
            startBtn.style.display = "none";
            gameArea.style.display = "block";
            startGame();
        };
    
        function startGame() {
            resultEl.textContent = "";
            nextBtn.style.display = "none";
            player.x = 230;
            player.y = 550;
            score = 0;
            startTime = Date.now();
    
            generatePlatforms();
            generateMonsters();
    
            gameRunning = true;
            clearInterval(gameInterval);
            gameInterval = setInterval(update, 20);
        }
    
        function generatePlatforms() {
            platforms = [];
            for (let i = 0; i < floors; i++) {
                platforms.push({
                    x: Math.random() * 350 + 50,
                    y: 550 - (i * floorHeight),
                    width: 120,
                    height: 15,
                    collapsing: false
                });
            }
        }
    
        function generateMonsters() {
            monsters = [];
        
            const monsterCount = 5;  // 🔥 increase difficulty here
        
            for (let i = 0; i < monsterCount; i++) {
                monsters.push({
                    x: Math.random() * (canvas.width - 30),
                    y: 100 + Math.random() * 400,
                    size: 20,
                    dx: (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2)
                });
            }
        }
    
        document.addEventListener("keydown", function(e) {
            if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
                e.preventDefault();
            }
            keys[e.key] = true;
        });
    
        document.addEventListener("keyup", function(e) {
            keys[e.key] = false;
        });
    
        function update() {
            if (!gameRunning) return;
    
            ctx.clearRect(0, 0, canvas.width, canvas.height);
    
            movePlayer();
            applyGravity();
            moveMonsters();
            drawPlatforms();
            drawMonsters();
            drawPlayer();
            checkMonsterCollision();
            checkWin();
        }
    
        function movePlayer() {
            if (keys["ArrowLeft"]) player.x -= player.speed;
            if (keys["ArrowRight"]) player.x += player.speed;
            if (keys["ArrowUp"]) player.y -= player.speed;
    
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
        }
    
        function applyGravity() {
            player.y += 2;
    
            platforms.forEach(p => {
                if (
                    player.x < p.x + p.width &&
                    player.x + player.size > p.x &&
                    player.y + player.size >= p.y &&
                    player.y + player.size <= p.y + p.height + 5
                ) {
                    player.y = p.y - player.size;
    
                    if (!p.collapsing) {
                        p.collapsing = true;
                        score += 100; // ⭐ points per platform
                        setTimeout(() => {
                            platforms = platforms.filter(pl => pl !== p);
                        }, 1000);
                    }
                }
            });
    
            if (player.y > canvas.height) {
                failGame("💀 You Fell!");
            }
        }
    
        function moveMonsters() {
            monsters.forEach(m => {
                m.x += m.dx;
                if (m.x <= 0 || m.x + m.size >= canvas.width) {
                    m.dx *= -1;
                }
            });
        }
    
        function checkMonsterCollision() {
            monsters.forEach(m => {
                if (
                    player.x < m.x + m.size &&
                    player.x + player.size > m.x &&
                    player.y < m.y + m.size &&
                    player.y + player.size > m.y
                ) {
                    failGame("👾 Caught by Monster!");
                }
            });
        }
    
        function drawPlatforms() {
            ctx.fillStyle = "white";
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });
        }
    
        function drawMonsters() {
            ctx.fillStyle = "purple";
            monsters.forEach(m => {
                ctx.fillRect(m.x, m.y, m.size, m.size);
            });
        }
    
        function drawPlayer() {
            ctx.fillStyle = "red";
            ctx.fillRect(player.x, player.y, player.size, player.size);
        }
    
        function checkWin() {
            let currentFloor = floors - Math.floor(player.y / floorHeight);
            floorDisplay.textContent = "Floor: " + currentFloor + " / 6";
    
            if (player.y <= 50) {
                winGame();
            }
        }
    
        function winGame() {
            gameRunning = false;
            clearInterval(gameInterval);
    
            let timeTaken = Math.floor((Date.now() - startTime) / 1000);
            let timeBonus = Math.max(0, 100 - timeTaken);
            score += timeBonus;
    
            resultEl.innerHTML =
                "🎉 Tower Cleared!<br>" +
                "Score: " + score;
    
            resultEl.style.color = "#00ff66";
            nextBtn.style.display = "inline-block";
    
            fetch("/complete/spades/9", { method: "POST" });
        }
    
        function failGame(msg) {
            gameRunning = false;
            clearInterval(gameInterval);
    
            resultEl.textContent = msg;
            resultEl.style.color = "#ff3333";
    
            setTimeout(startGame, 2000);
        }
    
    };
    </script>

{% endblock %}
