{% extends "base.html" %}
{% block content %}

<div class="game-container">
<div class="game-card-display">

<h2 class="menu-title">♣ 7 – Bridge of Trust</h2>

<p class="game-text">
Keep everyone above the danger line.<br>
Stabilize players when they drop below 60%.
</p>

<button id="start-btn" class="btn red-btn">Start Bridge</button>

<div id="game-area" style="display:none;">

<p id="status">Maintain rope stability.</p>

<div id="players"></div>

<p id="result"></p>

<div class="button-row">

<a id="next-btn"
href="{{ url_for('main.suit_cards', suit='clubs') }}"
class="btn card-btn"
style="display:none;">
Next Card →
</a>

<a href="{{ url_for('main.suit_cards', suit='clubs') }}"
class="btn card-btn">
Back
</a>

</div>

</div>
</div>
</div>

<script>

    window.onload=function(){
    
    const startBtn=document.getElementById("start-btn");
    const gameArea=document.getElementById("game-area");
    const playersDiv=document.getElementById("players");
    const resultEl=document.getElementById("result");
    const nextBtn=document.getElementById("next-btn");
    const status=document.getElementById("status");
    
    const players=["Arisu","Usagi","Kuina","Chishiya"];
    
    let tensions=[100,100,100,100];
    let stabilized=[false,false,false,false];
    
    let gameInterval;
    let panicInterval;
    
    startBtn.onclick=function(){
    
    startBtn.style.display="none";
    gameArea.style.display="block";
    
    renderPlayers();
    startGame();
    
    }
    
    /* -----------------------
    Create Player UI
    ----------------------- */
    
    function renderPlayers(){
    
    playersDiv.innerHTML="";
    
    players.forEach((p,i)=>{
    
    playersDiv.innerHTML+=`
    <div class="player-card">
    
    <b>${p}</b>
    
    <div class="bar-container">
    
    <div class="danger-line"></div>
    
    <div class="bar">
    <div class="bar-fill" id="bar${i}"></div>
    </div>
    
    </div>
    
    <button onclick="stabilize(${i})">
    Stabilize
    </button>
    
    </div>
    `;
    
    });
    
    }
    
    /* -----------------------
    Start Game
    ----------------------- */
    
    function startGame(){
    
    gameInterval=setInterval(updateBars,200);
    panicInterval=setInterval(randomPanic,2500);
    
    }
    
    /* -----------------------
    Decrease Stability
    ----------------------- */
    
    function updateBars(){
    
    for(let i=0;i<tensions.length;i++){
    
    tensions[i]-=0.4;
    
    if(tensions[i] <= 0){
    failGame(players[i]+" lost grip.");
    }
    
    updateBar(i);
    
    }
    
    }
    
    /* -----------------------
    Update Bar UI
    ----------------------- */
    
    function updateBar(i){
    
    const bar=document.getElementById("bar"+i);
    
    bar.style.width=tensions[i]+"%";
    
    if(tensions[i] <= 60){
    
    bar.style.background="#ff3333";
    
    }else{
    
    bar.style.background="#00ff66";
    
    }
    
    }
    
    /* -----------------------
    Random Panic Event
    ----------------------- */
    
    function randomPanic(){
    
    let i=Math.floor(Math.random()*players.length);
    
    tensions[i]-=15;
    
    status.textContent=players[i]+" is panicking! Stabilize!";
    
    }
    
    /* -----------------------
    Stabilize Player
    ----------------------- */
    
    window.stabilize=function(i){
    
    if(tensions[i] > 60){
    
    status.textContent="Too early! "+players[i]+" is still stable.";
    return;
    
    }
    
    tensions[i]+=30;
    
    if(tensions[i] > 100) tensions[i]=100;
    
    stabilized[i]=true;
    
    status.textContent=players[i]+" stabilized.";
    
    updateBar(i);
    
    checkWin();
    
    }
    
    /* -----------------------
    Check Win Condition
    ----------------------- */
    
    function checkWin(){
    
    if(
    stabilized.every(s => s === true) &&
    tensions.every(t => t > 60)
    ){
    
    clearInterval(gameInterval);
    clearInterval(panicInterval);
    
    resultEl.textContent="🎉 All players stabilized. Bridge held.";
    resultEl.style.color="#00ff66";
    
    nextBtn.style.display="inline-block";
    
    fetch("/complete/clubs/7",{method:"POST"});
    
    }
    
    }
    
    /* -----------------------
    Fail Game
    ----------------------- */
    
    function failGame(msg){
    
    clearInterval(gameInterval);
    clearInterval(panicInterval);
    
    resultEl.textContent="💀 Bridge collapsed: "+msg;
    resultEl.style.color="#ff3333";
    
    setTimeout(()=>location.reload(),2000);
    
    }
    
    }
    
    </script>

<style>

#players{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin:20px;
}

.player-card{
border:2px solid red;
padding:15px;
background:#111;
text-align:center;
}

.bar-container{
position:relative;
width:100%;
margin:10px 0;
}

.bar{
width:100%;
height:14px;
background:#333;
}

.bar-fill{
height:100%;
width:100%;
background:#00ff66;
transition:0.2s;
}

/* 60% red line */

.danger-line{
position:absolute;
left:60%;
top:-3px;
bottom:-3px;
width:2px;
background:red;
box-shadow:0 0 6px red;
}

button{
margin-top:8px;
padding:8px 12px;
border:2px solid red;
background:#111;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

</style>

{% endblock %}
